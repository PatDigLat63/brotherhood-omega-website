      - name: Deploy to Droplet
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DROPLET_IP }}
          username: ${{ env.DROPLET_USER }}
          key: ${{ secrets.OMEGA_SSH_PRIVATE_KEY }}
          port: ${{ secrets.OMEGA_SSH_PORT || 22 }}
          script: |
            set -e
            echo "🔱 Brotherhood Omega Dynasty v6.0 — Deploying monitoring update..."

            cd /opt/omega-dynasty-v6 || (mkdir -p /opt/omega-dynasty-v6 && cd /opt/omega-dynasty-v6)

            if [ -d .git ]; then
              git fetch origin main && git reset --hard origin/main
            fi

            # Write .env from secret
            cat > .env << 'EOF'
            ${{ secrets.OMEGA_ENV_FILE }}
            EOF
            chmod 600 .env

            # Apply new health checks + monitoring code
            docker compose down || true
            docker compose up -d --remove-orphans

            sleep 95

            echo "=== Current Container Health ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"

            echo "=== Running Health Monitor ==="
            python bin/monitor.py status || echo "monitor.py not ready yet"

            echo "✅ Deploy + Monitoring update complete"
